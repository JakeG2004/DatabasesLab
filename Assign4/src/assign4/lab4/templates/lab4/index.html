{% extends 'lab4/base.html' %}
{% load static %}

{% block title %}Dashboard - Pets Database{% endblock %}

{% block content %}
<div class="row">
  <div class="col-sm-12">
    <div class="home-tab">
      <div class="tab-content tab-content-basic">
        <div class="tab-pane fade show active" id="overview" role="tabpanel">
          <div class="row">
            <div class="col-12">
              <div class="row">
                <div class="col-md-6 grid-margin stretch-card">
                  <div class="card card-rounded">
                    <div class="card-body p-0"> 
                      <a href="{% url 'lab4:pets_db' %}" class="btn btn-primary btn-lg w-100 h-100 d-flex align-items-center justify-content-center text-white py-5 fs-3" style="border-radius: 15px;">
                        View Pets Table
                      </a>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 grid-margin stretch-card">
                  <div class="card card-rounded">
                    <div class="card-body p-0">
                      <a href="{% url 'lab4:foods_db' %}" class="btn btn-dark btn-lg w-100 h-100 d-flex align-items-center justify-content-center text-white py-5 fs-3" style="border-radius: 15px;">

                      </a>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 grid-margin stretch-card">
                  <div class="card card-rounded">
                    <div class="card-body p-0">
                      <a href="{% url 'lab4:likes_db' %}" class="btn btn-info btn-lg w-100 h-100 d-flex align-items-center justify-content-center text-white py-5 fs-3" style="border-radius: 15px;">

                      </a>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 grid-margin stretch-card">
                  <div class="card card-rounded">
                    <div class="card-body p-0">
                      <a href="{% url 'lab4:owners_db' %}" class="btn btn-success btn-lg w-100 h-100 d-flex align-items-center justify-content-center text-white py-5 fs-3" style="border-radius: 15px;">

                      </a>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 grid-margin stretch-card">
                  <div class="card card-rounded">
                    <div class="card-body p-0">
                      <a href="{% url 'lab4:owns_db' %}" class="btn btn-warning btn-lg w-100 h-100 d-flex align-items-center justify-content-center text-white py-5 fs-3" style="border-radius: 15px;">
                        View Owns Table
                      </a>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 grid-margin stretch-card">
                  <div class="card card-rounded">
                    <div class="card-body p-0">
                      <a href="{% url 'lab4:purchases_db' %}" class="btn btn-danger btn-lg w-100 h-100 d-flex align-items-center justify-content-center text-white py-5 fs-3" style="border-radius: 15px;">
                        View Purchases Table
                      </a>
                    </div>
                  </div>
                </div>

            </div>
          </div>

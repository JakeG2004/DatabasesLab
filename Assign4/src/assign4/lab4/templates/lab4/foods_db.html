{% extends "lab4/base.html" %}
{% load static %}
{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto text-center">
        <h1 class="display-4">Foods Table</h1>
    </div>
</div>

<hr>

<div class="row">
    <form id="member-form">
        {% csrf_token %}
        <div class="d-flex gap-2 align-items-center">
            <button type="button" class="btn btn-success w-100" data-bs-toggle="modal" data-bs-target="#addModal">
                Add
            </button>
        </div>
    </form>
</div>

<br>

<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Type of Food</th>
            <th>Price</th>
            <th>Weight</th>
            <th>Class of Food</th>
            <th></th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for food in foods %}
        <tr>
            <td>{{ food.FoodID }}</td>
            <td><input type="text" class="form-control name" value="{{ food.Name }}"></td>
            <td><input type="text" class="form-control brand" value="{{ food.Brand }}"></td>
            <td><input type="text" class="form-control typeoffood" value="{{ food.TypeofFood }}"></td>
            <td><input type="number" step="0.01" class="form-control price" value="{{ food.Price }}"></td>
            <td><input type="number" step="0.01" class="form-control itemweight" value="{{ food.ItemWeight }}"></td>
            <td><input type="text" class="form-control classoffood" value="{{ food.ClassofFood }}"></td>
            <td><button class="btn btn-primary update-btn" data-url="{% url 'lab4:update_food' food.FoodID %}">Apply</button></td>
            <td><button class="btn btn-danger delete-btn" data-url="{% url 'lab4:delete_food' food.FoodID %}">Delete</button></td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <form class="modal-content" method="POST" action="{% url 'lab4:add_food' %}">
            <div class="modal-header">
                <h5 class="modal-title" id="addModalLabel">Add New</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            {% csrf_token %}
            <div class="modal-body">
                <input type="text" name="name" class="form-control mb-2" placeholder="Name">
                <input type="text" name="brand" class="form-control mb-2" placeholder="Brand">
                <input type="text" name="typeoffood" class="form-control mb-2" placeholder="Food Type">
                <input type="number" name="price" step="0.01" class="form-control mb-2" placeholder="Price">
                <input type="number" name="itemweight" step="0.01" class="form-control mb-2" placeholder="Item Weight">
                <input type="text" name="classoffood" class="form-control mb-2" placeholder="Class of Food">
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-success">Save</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}<script src="{% static 'js/foods.js' %}"></script>{% endblock %}
